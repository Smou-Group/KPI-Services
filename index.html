<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تقرير صيانة المصعد</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>
@page { size: A4; margin: 5mm; }

body {
  margin: 0;
  font-family: Tahoma;
  background: #f4f7fb;
}

.container {
  max-width: 1100px;
  margin: 15px auto;
  background: white;
  padding: 12px;
  border-radius: 12px;
}

h1 {
  text-align: center;
  color: #0b3b82;
  font-size: 22px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
}

label {
  font-size: 12px;
  font-weight: bold;
}

input, select, textarea {
  width: 100%;
  padding: 6px;
  font-size: 12px;
}

table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 8px;
  font-size: 11px;
}

th, td {
  border: 1px solid #ddd;
  padding: 4px;
  text-align: center;
}

th {
  background: #0b3b82;
  color: white;
}

td:nth-child(2) {
  text-align: right;
}

.buttons {
  display: grid;
  grid-template-columns: repeat(4,1fr);
  gap: 6px;
  margin-top: 10px;
}

button {
  padding: 10px;
  border: none;
  color: white;
  font-weight: bold;
  cursor: pointer;
}

.save { background: #0b3b82; }
.print { background: green; }
.edit { background: orange; }
.close { background: red; }

textarea { height: 50px; }

@media print {
  .buttons { display:none; }
}
</style>
</head>

<body>

<div class="container" id="reportArea">

<h1>تقرير صيانة المصعد</h1>

<form id="form">

<div class="grid">
<input name="date" id="date" readonly>
<input name="time" id="time" readonly>
<input name="reportNo" id="reportNo" readonly>

<input name="contractNo" placeholder="رقم العقد">
<input name="customerName" placeholder="اسم العميل">
<input name="location" placeholder="الموقع">

<select name="technician">
<option>اختر الفني</option>
<option>احمد</option>
<option>سيد</option>
<option>محمد</option>
<option>علي</option>
<option>خالد</option>
</select>
</div>

<table>
<thead>
<tr><th>م</th><th>البند</th><th>✔</th></tr>
</thead>
<tbody id="items"></tbody>
</table>

<textarea name="notes" placeholder="ملاحظات"></textarea>

<div class="buttons">
<button class="save" type="submit">حفظ</button>
<button class="print" type="button" onclick="pdf()">PDF + واتساب</button>
<button class="edit" type="button" onclick="enable()">تعديل</button>
<button class="close" type="button" onclick="window.close()">إغلاق</button>
</div>

<div id="msg"></div>

</form>
</div>

<script>
const SCRIPT_URL = "https://script.google.com/a/macros/smou.ae/s/AKfycbzLB-yQsZW4ZQPKvrKcZ4DNPtJiGt9yoR44u7uPxoz1x1hXyF8O4N_RUKuy-3RR4LuaHw/exec";

const list = [
"التأكد من عمل التكييف",
"فتح وغلق الفرامل",
"منسوب الزيت",
"فحص الباور",
"تشغيل الكنترول",
"تنظيف الكنترول",
"تنظيف الكابينة",
"فحص الويرات",
"إضافة زيت",
"تربيط السكة",
"WD40",
"دوائر الأمان",
"مكونات الكابينة",
"لوحة المفاتيح",
"Alarm",
"تسارع الكابينة",
"الأبواب",
"توقف الكابينة"
];

const tbody = document.getElementById("items");

list.forEach((item,i)=>{
tbody.innerHTML += `
<tr>
<td>${i+1}</td>
<td>${item}</td>
<td><input type="checkbox" name="item${i+1}" value="تم"></td>
</tr>`;
});

function init(){
let now=new Date();
date.value=now.toLocaleDateString("en-CA");
time.value=now.toLocaleTimeString();

let last=localStorage.getItem("no")||2605000;
reportNo.value=++last;
localStorage.setItem("no",last);
}
init();

form.addEventListener("submit", async(e)=>{
e.preventDefault();

let msg=document.getElementById("msg");
msg.innerHTML="جاري الحفظ...";

let data=Object.fromEntries(new FormData(form).entries());

for(let i=1;i<=18;i++){
if(!data["item"+i]) data["item"+i]="لم يتم";
}

let body=new URLSearchParams(data);

await fetch(SCRIPT_URL,{
method:"POST",
mode:"no-cors",
body:body
});

msg.innerHTML="✔ تم الحفظ";
});

function pdf(){
let el=document.getElementById("reportArea");

html2pdf().from(el).save().then(()=>{
window.open("https://wa.me/?text=تم إنشاء تقرير الصيانة PDF","_blank");
});
}

function enable(){
document.querySelectorAll("input,select,textarea").forEach(e=>e.disabled=false);
}
</script>

</body>
</html>
