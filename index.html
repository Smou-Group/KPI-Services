<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SMOU Maintenance Report</title>

<!-- PDF LIBRARIES -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{
  margin:0;
  font-family:Tahoma;
  background:#0b3b82;
  padding:10px;
}

/* UI */
.container{
  max-width:800px;
  margin:auto;
  background:#fff;
  border-radius:15px;
  padding:10px;
}

.header{
  text-align:center;
  background:#0b3b82;
  color:#fff;
  padding:10px;
  border-radius:10px;
}

.logo{
  width:70px;
  background:#fff;
  border-radius:10px;
  padding:5px;
}

input,select,textarea{
  width:100%;
  padding:10px;
  margin:5px 0;
  border-radius:8px;
  border:1px solid #ccc;
}

.check{
  display:flex;
  justify-content:space-between;
  border:1px solid #eee;
  padding:8px;
  border-radius:8px;
  margin-bottom:5px;
  font-size:12px;
}

button{
  width:100%;
  padding:12px;
  margin-top:8px;
  border:none;
  border-radius:10px;
  color:#fff;
  font-weight:bold;
}

.save{background:#16a34a}
.pdf{background:#0b3b82}
.close{background:#dc2626}

/* PDF */
#pdfPage{
  width:794px;
  height:1123px;
  padding:20px;
  background:#fff;
  direction:rtl;
  font-family:Tahoma;
}

.pdf-header{
  background:#0b3b82;
  color:#fff;
  padding:10px;
  border-radius:10px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.pdf-items{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:5px;
  margin-top:10px;
}

.pdf-item{
  border:1px solid #ccc;
  padding:5px;
  font-size:10px;
  display:flex;
  justify-content:space-between;
}
</style>
</head>

<body>

<div class="container">

<div class="header">
<img src="logo.png" class="logo">
<h3>SMOU Group</h3>
</div>

<form id="form">

<input id="date" name="date" readonly>
<input id="time" name="time" readonly>
<input id="reportNo" name="reportNo" readonly>

<input name="customerName" placeholder="اسم العميل">
<input name="location" placeholder="الموقع">

<select name="technician">
<option>اختر الفني</option>
<option>احمد</option>
<option>محمد</option>
</select>

<div id="items"></div>

<textarea name="notes" placeholder="ملاحظات"></textarea>

<button type="button" class="save" onclick="saveAndPDF()">حفظ + PDF</button>
<button type="button" class="pdf" onclick="downloadPDF()">PDF فقط</button>
<button type="button" class="close" onclick="window.close()">إغلاق</button>

</form>

</div>

<script>

const SCRIPT_URL="PUT YOUR GOOGLE SCRIPT HERE";

const items=[
"فحص التكييف",
"الفرامل",
"الزيت",
"الباور",
"الكنترول",
"تنظيف",
"الويرات",
"WD40",
"الأبواب",
"التوقف"
];

const box=document.getElementById("items");

items.forEach((t,i)=>{
box.innerHTML+=`
<div class="check">
<span>${t}</span>
<input type="checkbox" name="item${i}">
</div>`;
});

function init(){
let d=new Date();
date.value=d.toLocaleDateString();
time.value=d.toLocaleTimeString();
reportNo.value=Date.now();
}
init();

function getData(){
let f=new FormData(form);
let data=Object.fromEntries(f.entries());

items.forEach((_,i)=>{
if(!data["item"+i]) data["item"+i]="لم يتم";
});

return data;
}

async function saveAndPDF(){
let data=getData();
await fetch(SCRIPT_URL,{method:"POST",mode:"no-cors",body:new URLSearchParams(data)});
createPDF(data,"share");
}

function downloadPDF(){
let data=getData();
createPDF(data,"download");
}

async function createPDF(data,mode){

let rows="";
items.forEach((t,i)=>{
rows+=`<div class="pdf-item">${t} <b>${data["item"+i]=="on"?"✓":"✖"}</b></div>`;
});

let div=document.createElement("div");
div.innerHTML=`
<div id="pdfPage">

<div class="pdf-header">
<div>SMOU Group</div>
<div>تقرير صيانة</div>
</div>

<p>التاريخ: ${data.date}</p>
<p>العميل: ${data.customerName}</p>

<div class="pdf-items">
${rows}
</div>

<p>ملاحظات: ${data.notes||""}</p>

</div>
`;

document.body.appendChild(div);

await new Promise(r=>setTimeout(r,500));

let canvas=await html2canvas(document.getElementById("pdfPage"),{
scale:2,
useCORS:true
});

const { jsPDF } = window.jspdf;
let pdf=new jsPDF("p","px",[794,1123]);

pdf.addImage(canvas.toDataURL("image/jpeg"),"JPEG",0,0,794,1123);

let blob=pdf.output("blob");

document.body.removeChild(div);

let file=new File([blob],"report.pdf",{type:"application/pdf"});

if(mode=="share" && navigator.canShare){
await navigator.share({files:[file]});
}else{
pdf.save("report.pdf");
}

}
</script>

</body>
</html>
