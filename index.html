<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SMOU Group - Maintenance Report</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcode/1.5.3/qrcode.min.js"></script>

<style>
*{box-sizing:border-box}

body{
  margin:0;
  font-family:Tahoma,Arial,sans-serif;
  background:linear-gradient(160deg,#03152f,#082d63);
  min-height:100vh;
  padding:10px;
}

.container{
  max-width:850px;
  margin:auto;
  background:#fff;
  border-radius:22px;
  overflow:hidden;
  box-shadow:0 20px 45px rgba(0,0,0,.35);
}

.header{
  background:linear-gradient(135deg,#061b3a,#0b3b82);
  color:white;
  padding:18px;
  text-align:center;
}

.logo{
  width:80px;
  height:80px;
  object-fit:contain;
  background:white;
  border-radius:16px;
  padding:8px;
  margin-bottom:8px;
}

.header h2{margin:0;font-size:22px}
.header p{margin:5px 0 0;font-size:13px;color:#dbeafe}

.title{
  text-align:center;
  background:#f1f5f9;
  color:#061b3a;
  font-size:20px;
  font-weight:bold;
  padding:14px;
}

form{padding:14px}

.grid{
  display:grid;
  grid-template-columns:1fr;
  gap:10px;
}

.field label{
  display:block;
  font-size:13px;
  font-weight:bold;
  color:#334155;
  margin-bottom:5px;
}

input,select,textarea{
  width:100%;
  padding:13px;
  font-size:15px;
  border:1px solid #cbd5e1;
  border-radius:14px;
  background:#f8fafc;
}

.section-title{
  margin:16px 0 10px;
  padding:11px;
  background:#061b3a;
  color:white;
  border-radius:12px;
  font-weight:bold;
  text-align:center;
}

.check-item{
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:#f8fafc;
  border:1px solid #dbe3ef;
  border-radius:13px;
  padding:11px;
  margin-bottom:8px;
  font-size:13px;
  font-weight:bold;
}

.check-item input{
  width:24px;
  height:24px;
}

textarea{
  height:80px;
  resize:none;
}

.buttons{
  display:grid;
  grid-template-columns:1fr;
  gap:10px;
  margin-top:15px;
}

button{
  border:none;
  color:white;
  padding:15px;
  border-radius:14px;
  font-size:15px;
  font-weight:bold;
  cursor:pointer;
}

.savepdf{background:#15803d}
.downloadpdf{background:#0b3b82}
.close{background:#dc2626}

#msg{
  text-align:center;
  margin-top:12px;
  font-weight:bold;
  color:#0b3b82;
}

.footer{
  text-align:center;
  padding:12px;
  color:#64748b;
  font-size:11px;
}

/* PDF PAGE */
.pdf-wrapper{
  position:fixed;
  top:0;
  left:0;
  width:794px;
  height:1123px;
  background:white;
  z-index:999999;
}

.pdf-page{
  width:794px;
  height:1123px;
  padding:22px;
  background:white;
  font-family:Tahoma,Arial,sans-serif;
  direction:rtl;
  color:#111827;
  overflow:hidden;
}

.pdf-header{
  background:linear-gradient(135deg,#061b3a,#0b3b82);
  color:white;
  border-radius:10px;
  padding:12px 16px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.pdf-brand{
  display:flex;
  align-items:center;
  gap:10px;
}

.pdf-logo{
  width:50px;
  height:50px;
  background:white;
  border-radius:9px;
  padding:5px;
  object-fit:contain;
}

.pdf-company{
  font-size:18px;
  font-weight:bold;
}

.pdf-sub{
  font-size:10px;
  color:#dbeafe;
}

.pdf-title{
  font-size:18px;
  font-weight:bold;
  text-align:center;
}

.pdf-qr{
  width:70px;
  height:70px;
  background:white;
  border-radius:8px;
  padding:4px;
}

.pdf-info{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:7px;
  margin-top:10px;
}

.pdf-box{
  border:1px solid #cbd5e1;
  border-radius:7px;
  padding:7px;
  min-height:44px;
}

.pdf-label{
  font-size:9px;
  color:#475569;
}

.pdf-value{
  font-size:11px;
  font-weight:bold;
  margin-top:3px;
}

.pdf-section{
  margin-top:10px;
  background:#061b3a;
  color:white;
  padding:7px 10px;
  border-radius:7px;
  font-size:12px;
  font-weight:bold;
}

.pdf-items-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:6px;
  margin-top:7px;
}

.pdf-item{
  border:1px solid #cbd5e1;
  border-radius:7px;
  padding:5px;
  display:grid;
  grid-template-columns:28px 1fr 55px;
  align-items:center;
  gap:5px;
  min-height:34px;
}

.pdf-no{
  text-align:center;
  font-size:10px;
  font-weight:bold;
  color:#0b3b82;
}

.pdf-text{
  font-size:9px;
  line-height:1.25;
}

.pdf-status{
  font-size:10px;
  text-align:center;
  font-weight:bold;
  color:#15803d;
}

.pdf-notes{
  margin-top:10px;
  border:1px solid #cbd5e1;
  border-radius:7px;
  padding:8px;
  min-height:42px;
  font-size:10px;
}

.pdf-sign{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:25px;
  margin-top:16px;
}

.pdf-sign div{
  border-top:1px solid #334155;
  padding-top:6px;
  font-size:10px;
  text-align:center;
}

.pdf-footer{
  margin-top:8px;
  text-align:center;
  font-size:8px;
  color:#64748b;
}

@media(min-width:700px){
  .grid{grid-template-columns:repeat(2,1fr)}
  .buttons{grid-template-columns:repeat(3,1fr)}
}
</style>
</head>

<body>

<div class="container">

  <div class="header">
    <img src="logo.png" class="logo" alt="SMOU Group Logo">
    <h2>مجموعة سمو | SMOU Group</h2>
    <p>Elevators & Air Conditioning</p>
  </div>

  <div class="title">تقرير صيانة المصعد | Elevator Maintenance Report</div>

  <form id="form">

    <div class="grid">
      <div class="field">
        <label>التاريخ | Date</label>
        <input name="date" id="date" readonly>
      </div>

      <div class="field">
        <label>الوقت | Time</label>
        <input name="time" id="time" readonly>
      </div>

      <div class="field">
        <label>رقم التقرير | Report No.</label>
        <input name="reportNo" id="reportNo" readonly>
      </div>

      <div class="field">
        <label>رقم العقد | Contract No.</label>
        <input name="contractNo" placeholder="رقم العقد | Contract No.">
      </div>

      <div class="field">
        <label>اسم العميل | Customer Name</label>
        <input name="customerName" placeholder="اسم العميل | Customer Name">
      </div>

      <div class="field">
        <label>الموقع | Location</label>
        <input name="location" placeholder="الموقع | Location">
      </div>

      <div class="field">
        <label>الفني | Technician</label>
        <select name="technician">
          <option value="">اختر الفني | Select Technician</option>
          <option>Hassan Taher - حسن طاهر </option>
          <option>Anwar Ali- أنور علي</option>
          <option>Abdulaziz Alalfi - عبدالعزيز الألفي</option>
          <option>Sayed Mahmoud - السيد محمود</option>
          <option>Sadiq yousif - صديق يوسف </option>
        </select>
      </div>
    </div>

    <div class="section-title">بنود الصيانة | Maintenance Checklist</div>
    <div id="items"></div>

    <div class="section-title">ملاحظات | Notes</div>
    <textarea name="notes" placeholder="ملاحظات | Notes"></textarea>

    <div class="buttons">
      <button type="button" class="savepdf" onclick="saveAndSharePDF()">حفظ في Google Sheet + إرسال PDF</button>
      <button type="button" class="downloadpdf" onclick="downloadPDFOnly()">حفظ PDF فقط</button>
      <button type="button" class="close" onclick="window.close()">إغلاق | Close</button>
    </div>

    <div id="msg"></div>

  </form>

  <div class="footer">SMOU Group - Maintenance Report</div>

</div>

<script>
const SCRIPT_URL="https://script.google.com/macros/s/AKfycbyOwiFy1_yHWGq_id30gl0YVscY8enyVZfAdtLYgDiKn5ek1R-cEMGoI_QK3hephXHLwg/exec";

const items=[
["التأكد من عمل التكييف وتنظيف الماكينة من الغبار والأتربة","Check AC operation and clean machine dust"],
["التأكد من فتح وغلق الفرامل","Check brake opening and closing"],
["التحقق من منسوب زيت الماكينة","Check machine oil level"],
["التحقق من الواير والانتباه لعلامات التآكل","Check wire and wear signs"],
["التحقق من جودة تشغيل الكنترول","Check controller operation quality"],
["تنظيف الكنترول بواسطة البلاور","Clean controller by blower"],
["تنظيف أعلى الكابينة من الغبار والأتربة","Clean car top from dust"],
["التأكد من عدم ارتخاء الويرات وجودة التثبيت","Check ropes tension and fixing"],
["إضافة زيت إلى المزايت","Adding oil to the lubricator"],
["تزييت سكة النقل","Lubrication of the guide rails"],
["استخدام WD40 للأجزاء المتحركة في الباب","Use WD40 for door moving parts"],
["مراجعة دوائر الأمان وشوك الأبواب الداخلي والخارجي","Check safety circuits and door locks"],
["التحقق من سلامة مكونات الكابينة الداخلية","Check cabin internal components"],
["فحص لوحة المفاتيح والتأكد من الاستجابة","Check COP buttons response"],
["اختبار مفتاح الانذار","Test Alarm button"],
["التحقق من تسارع الكابينة وتباطؤها ودقة ضبطها اثناء الحركة للاعلى والاسفل ","Checking the cabin acceleration and deceleration, and verifying the accuracy of its adjustment during upward and downward travel."],
["التأكد من عمل حركة الأبواب بسلاسة","Check smooth door operation"],
[" التأكد من وقوف الكابينة على كل مستوى بدقة ونظافة مجرى باب الكابينة","Ensuring the cabin stops accurately at each level and cleaning the cabin door track"]
];

const itemsBox=document.getElementById("items");

items.forEach((item,index)=>{
  itemsBox.innerHTML+=`
    <label class="check-item">
      <span>${index+1}. ${item[0]}<br><small>${item[1]}</small></span>
      <input type="checkbox" name="item${index+1}" value="تم">
    </label>
  `;
});

function init(){
  const now=new Date();
  document.getElementById("date").value=now.toLocaleDateString("en-CA");
  document.getElementById("time").value=now.toLocaleTimeString("ar-AE");

  let lastNo=localStorage.getItem("SMOU_REPORT_NO")||2605000;
  lastNo++;
  document.getElementById("reportNo").value=lastNo;
  localStorage.setItem("SMOU_REPORT_NO",lastNo);
}
init();

function collectData(){
  const form=document.getElementById("form");
  const formData=new FormData(form);

  for(let i=1;i<=18;i++){
    if(!formData.has("item"+i)){
      formData.append("item"+i,"لم يتم");
    }
  }

  return formData;
}

async function saveToSheet(formData){
  await fetch(SCRIPT_URL,{
    method:"POST",
    mode:"no-cors",
    body:formData
  });
}

async function saveAndSharePDF(){
  const msg=document.getElementById("msg");
  msg.innerHTML="جاري الحفظ وإنشاء PDF... | Saving and generating PDF...";

  const formData=collectData();
  await saveToSheet(formData);

  const data=Object.fromEntries(formData.entries());
  await createPDF(data,"share");

  msg.innerHTML="✔ تم الحفظ وفتح مشاركة PDF | Saved and PDF share opened";
}

async function downloadPDFOnly(){
  const msg=document.getElementById("msg");
  msg.innerHTML="جاري إنشاء PDF... | Generating PDF...";

  const formData=collectData();
  const data=Object.fromEntries(formData.entries());

  await createPDF(data,"download");

  msg.innerHTML="✔ تم حفظ PDF | PDF saved";
}

async function createPDF(data,mode){
  const msg=document.getElementById("msg");

  try{
    let itemCards="";

    items.forEach((item,index)=>{
      const status=data["item"+(index+1)]==="تم" ? "✓ Done" : "Not Done";
      itemCards+=`
        <div class="pdf-item">
          <div class="pdf-no">${index+1}</div>
          <div class="pdf-text">${item[0]}<br>${item[1]}</div>
          <div class="pdf-status">${status}</div>
        </div>
      `;
    });

    const reportNo=data.reportNo||"Report";
    const fileName="SMOU-Maintenance-Report-"+reportNo+".pdf";

    let qrDataUrl="";
    try{
      qrDataUrl=await QRCode.toDataURL(
        `SMOU Group Maintenance Report
Report No: ${reportNo}
Date: ${data.date||""}
Contract No: ${data.contractNo||""}
Customer: ${data.customerName||""}
Technician: ${data.technician||""}`,
        {width:90,margin:1}
      );
    }catch(e){
      qrDataUrl="";
    }

    const wrapper=document.createElement("div");
    wrapper.className="pdf-wrapper";

    wrapper.innerHTML=`
      <div class="pdf-page" id="pdfPage">

        <div class="pdf-header">
          <div class="pdf-brand">
            <img src="logo.png" class="pdf-logo" onerror="this.style.display='none'">
            <div>
              <div class="pdf-company">مجموعة سمو | SMOU Group</div>
              <div class="pdf-sub">Elevators & Air Conditioning</div>
            </div>
          </div>

          <div class="pdf-title">تقرير صيانة المصعد<br>Elevator Maintenance Report</div>

          ${qrDataUrl ? `<img src="${qrDataUrl}" class="pdf-qr">` : ""}
        </div>

        <div class="pdf-info">
          <div class="pdf-box"><div class="pdf-label">التاريخ | Date</div><div class="pdf-value">${data.date||""}</div></div>
          <div class="pdf-box"><div class="pdf-label">الوقت | Time</div><div class="pdf-value">${data.time||""}</div></div>
          <div class="pdf-box"><div class="pdf-label">رقم التقرير | Report No.</div><div class="pdf-value">${data.reportNo||""}</div></div>
          <div class="pdf-box"><div class="pdf-label">رقم العقد | Contract No.</div><div class="pdf-value">${data.contractNo||""}</div></div>
          <div class="pdf-box"><div class="pdf-label">اسم العميل | Customer</div><div class="pdf-value">${data.customerName||""}</div></div>
          <div class="pdf-box"><div class="pdf-label">الموقع | Location</div><div class="pdf-value">${data.location||""}</div></div>
          <div class="pdf-box"><div class="pdf-label">الفني | Technician</div><div class="pdf-value">${data.technician||""}</div></div>
          <div class="pdf-box"><div class="pdf-label">نوع التقرير | Type</div><div class="pdf-value">صيانة دورية | Periodic</div></div>
        </div>

        <div class="pdf-section">بنود الفحص والصيانة | Maintenance Checklist</div>

        <div class="pdf-items-grid">
          ${itemCards}
        </div>

        <div class="pdf-notes">
          <strong>ملاحظات | Notes:</strong><br>
          ${data.notes||"لا توجد ملاحظات | No notes"}
        </div>

        <div class="pdf-sign">
          <div>توقيع الفني | Technician Signature</div>
          <div>توقيع العميل | Customer Signature</div>
        </div>

        <div class="pdf-footer">
          SMOU Group - Elevators & Air Conditioning | Maintenance Report
        </div>

      </div>
    `;

    document.body.appendChild(wrapper);
    window.scrollTo(0,0);

    await new Promise(resolve=>setTimeout(resolve,200));

    const element=document.getElementById("pdfPage");

    const canvas=await html2canvas(element,{
      scale:1.2,
      useCORS:true,
      backgroundColor:"#ffffff",
      logging:false,
      width:794,
      height:1123,
      windowWidth:794,
      windowHeight:1123,
      scrollX:0,
      scrollY:0
    });

    const imgData=canvas.toDataURL("image/jpeg",0.9);

    const { jsPDF }=window.jspdf;

    const pdf=new jsPDF({
      orientation:"portrait",
      unit:"px",
      format:[794,1123],
      compress:true
    });

    pdf.addImage(imgData,"JPEG",0,0,794,1123);

    const pdfBlob=pdf.output("blob");

    document.body.removeChild(wrapper);

    const file=new File([pdfBlob],fileName,{type:"application/pdf"});

    if(mode==="share" && navigator.canShare && navigator.canShare({files:[file]})){
      await navigator.share({
        title:"Elevator Maintenance Report",
        text:"SMOU Group Maintenance Report",
        files:[file]
      });
    }else{
      const url=URL.createObjectURL(pdfBlob);
      const a=document.createElement("a");
      a.href=url;
      a.download=fileName;
      a.click();
      URL.revokeObjectURL(url);
    }

  }catch(error){
    console.error(error);
    msg.innerHTML="❌ حدث خطأ أثناء إنشاء PDF | Error generating PDF";
  }
}
</script>

</body>
</html>
