<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>تقرير صيانة المصعد - SMOU Group</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>
*{box-sizing:border-box}

body{
  margin:0;
  font-family:Tahoma;
  background:linear-gradient(160deg,#03152f,#082d63);
  padding:10px;
}

.container{
  max-width:850px;
  margin:auto;
  background:#fff;
  border-radius:20px;
  overflow:hidden;
}

.header{
  background:#0b3b82;
  color:#fff;
  text-align:center;
  padding:15px;
}

.logo{
  width:70px;
  background:#fff;
  border-radius:10px;
  padding:5px;
}

.title{
  text-align:center;
  padding:10px;
  background:#f1f5f9;
  font-weight:bold;
}

form{padding:10px}

input,select,textarea{
  width:100%;
  padding:12px;
  margin:5px 0;
  border-radius:10px;
  border:1px solid #ccc;
}

.check{
  display:flex;
  justify-content:space-between;
  border:1px solid #eee;
  padding:8px;
  border-radius:10px;
  margin-bottom:5px;
  font-size:12px;
}

button{
  width:100%;
  padding:12px;
  margin-top:8px;
  border:none;
  border-radius:10px;
  color:#fff;
  font-weight:bold;
}

.save{background:#0b3b82}
.pdf{background:#16a34a}

#msg{text-align:center;margin-top:10px}

/* PDF FIX */
.pdf-hidden{
  position: fixed;
  top: 0;
  right: 0;
  width: 210mm;
  background: white;
  z-index: -1;
  opacity: 0.01;
}

.pdf-page{
  width:210mm;
  height:297mm;
  padding:6mm;
  font-size:10px;
}

table{
  width:100%;
  border-collapse:collapse;
  font-size:9px;
}

th,td{
  border:1px solid #ccc;
  padding:4px;
}

th{background:#0b3b82;color:#fff}

</style>
</head>

<body>

<div class="container" id="appArea">

<div class="header">
<img src="logo.png" class="logo">
<h3>مجموعة سمو</h3>
</div>

<div class="title">تقرير صيانة المصعد</div>

<form id="form">

<input name="date" id="date" readonly>
<input name="time" id="time" readonly>
<input name="reportNo" id="reportNo" readonly>

<input name="contractNo" placeholder="رقم العقد">
<input name="customerName" placeholder="اسم العميل">
<input name="location" placeholder="الموقع">

<select name="technician">
<option>اختر الفني</option>
<option>احمد</option>
<option>محمد</option>
<option>علي</option>
</select>

<div id="items"></div>

<textarea name="notes" placeholder="ملاحظات"></textarea>

<button class="save" type="submit">حفظ</button>
<button class="pdf" type="button" onclick="sharePDF()">PDF + واتساب</button>

<div id="msg"></div>

</form>

</div>

<script>

const SCRIPT_URL="https://script.google.com/macros/s/AKfycbyOwiFy1_yHWGq_id30gl0YVscY8enyVZfAdtLYgDiKn5ek1R-cEMGoI_QK3hephXHLwg/exec";

const items=[
"التأكد من عمل التكييف",
"فتح وغلق الفرامل",
"منسوب الزيت",
"فحص الباور",
"تشغيل الكنترول",
"تنظيف الكنترول",
"تنظيف الكابينة",
"فحص الويرات",
"إضافة زيت",
"تربيط السكة",
"WD40",
"دوائر الأمان",
"مكونات الكابينة",
"لوحة المفاتيح",
"Alarm",
"تسارع الكابينة",
"الأبواب",
"توقف الكابينة"
];

const box=document.getElementById("items");

items.forEach((t,i)=>{
box.innerHTML+=`
<label class="check">
<span>${i+1}. ${t}</span>
<input type="checkbox" name="item${i+1}" value="تم">
</label>`;
});

function init(){
let n=new Date();
date.value=n.toLocaleDateString("en-CA");
time.value=n.toLocaleTimeString();
reportNo.value=Date.now();
}
init();

form.onsubmit=(e)=>{
e.preventDefault();

let data=new FormData(form);

for(let i=1;i<=18;i++){
if(!data.has("item"+i)) data.append("item"+i,"لم يتم");
}

fetch(SCRIPT_URL,{method:"POST",mode:"no-cors",body:data});

msg.innerHTML="✔ تم الحفظ";
};

async function sharePDF(){

let data=Object.fromEntries(new FormData(form));

for(let i=1;i<=18;i++){
if(!data["item"+i]) data["item"+i]="لم يتم";
}

let rows="";
items.forEach((t,i)=>{
rows+=`
<tr>
<td>${i+1}</td>
<td>${t}</td>
<td>${data["item"+(i+1)]=="تم"?"✓":"✖"}</td>
</tr>`;
});

let wrap=document.createElement("div");
wrap.className="pdf-hidden";

wrap.innerHTML=`
<div class="pdf-page" id="pdfPage">

<h3>SMOU Group - تقرير صيانة</h3>

<p>التاريخ: ${data.date}</p>
<p>الوقت: ${data.time}</p>
<p>رقم التقرير: ${data.reportNo}</p>
<p>العميل: ${data.customerName}</p>

<table>
<tr><th>م</th><th>البند</th><th>الحالة</th></tr>
${rows}
</table>

<p>${data.notes||""}</p>

</div>
`;

document.body.appendChild(wrap);

let el=document.getElementById("pdfPage");

await new Promise(r=>setTimeout(r,500));

let opt={
margin:0,
filename:"report.pdf",
html2canvas:{scale:2},
jsPDF:{unit:"mm",format:"a4"}
};

let worker=html2pdf().set(opt).from(el);
let blob=await worker.outputPdf("blob");

document.body.removeChild(wrap);

let file=new File([blob],"report.pdf",{type:"application/pdf"});

if(navigator.canShare && navigator.canShare({files:[file]})){
await navigator.share({files:[file]});
}else{
html2pdf().set(opt).from(el).save();
}

}

</script>

</body>
</html>
