<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تقرير صيانة المصعد - SMOU Group</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>
@page { size: A4; margin: 5mm; }

body {
  margin: 0;
  font-family: Tahoma, Arial;
  background: linear-gradient(135deg, #061b3a, #0b3b82, #04152e);
  min-height: 100vh;
  color: #111;
}

.container {
  max-width: 1100px;
  margin: 15px auto;
  background: #ffffff;
  padding: 14px;
  border-radius: 18px;
  box-shadow: 0 15px 40px rgba(0,0,0,0.35);
  border: 1px solid rgba(255,255,255,0.25);
}

.header {
  background: linear-gradient(135deg, #061b3a, #0b3b82);
  color: white;
  border-radius: 16px;
  padding: 14px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 12px;
}

.logo-box {
  display: flex;
  align-items: center;
  gap: 12px;
}

.logo-box img {
  width: 70px;
  height: 70px;
  object-fit: contain;
  background: white;
  border-radius: 12px;
  padding: 6px;
}

.company-name {
  font-size: 22px;
  font-weight: bold;
}

.company-sub {
  font-size: 13px;
  color: #dbeafe;
  margin-top: 4px;
}

.report-title {
  text-align: left;
  font-size: 20px;
  font-weight: bold;
}

h1 {
  text-align: center;
  color: #0b3b82;
  font-size: 22px;
  margin: 10px 0;
}

.grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
}

input, select, textarea {
  width: 100%;
  padding: 8px;
  font-size: 12px;
  border: 1px solid #cbd5e1;
  border-radius: 8px;
  box-sizing: border-box;
  background: #f8fafc;
}

input:focus, select:focus, textarea:focus {
  outline: none;
  border-color: #0b3b82;
  background: #ffffff;
}

table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 10px;
  font-size: 11px;
  overflow: hidden;
  border-radius: 10px;
}

th, td {
  border: 1px solid #dbe3ef;
  padding: 5px;
  text-align: center;
}

th {
  background: #061b3a;
  color: white;
}

td:nth-child(2) {
  text-align: right;
  font-weight: bold;
}

tbody tr:nth-child(even) {
  background: #f1f5f9;
}

textarea {
  height: 55px;
  margin-top: 10px;
}

.buttons {
  display: grid;
  grid-template-columns: repeat(4,1fr);
  gap: 8px;
  margin-top: 12px;
}

button {
  padding: 11px;
  border: none;
  color: white;
  font-weight: bold;
  cursor: pointer;
  border-radius: 10px;
  font-size: 13px;
}

.save { background: #0b3b82; }
.print { background: #15803d; }
.edit { background: #f59e0b; }
.close { background: #dc2626; }

#msg {
  margin-top: 10px;
  text-align: center;
  font-weight: bold;
  color: #0b3b82;
}

.footer {
  margin-top: 10px;
  text-align: center;
  font-size: 11px;
  color: #475569;
}

@media print {
  body {
    background: white;
  }

  .container {
    box-shadow: none;
    margin: 0;
    border-radius: 0;
  }

  .buttons {
    display:none;
  }
}

@media (max-width: 768px) {
  .grid {
    grid-template-columns: repeat(2, 1fr);
  }

  .header {
    flex-direction: column;
    gap: 10px;
    text-align: center;
  }

  .report-title {
    text-align: center;
  }
}
</style>
</head>

<body>

<div class="container" id="reportArea">

<div class="header">
  <div class="logo-box">
    <img src="logo.png" alt="SMOU Group Logo">
    <div>
      <div class="company-name">مجموعة سمو</div>
      <div class="company-sub">SMOU Group</div>
    </div>
  </div>

  <div class="report-title">
    تقرير صيانة المصعد
  </div>
</div>

<form id="form">

<div class="grid">
<input name="date" id="date" readonly>
<input name="time" id="time" readonly>
<input name="reportNo" id="reportNo" readonly>

<input name="contractNo" placeholder="رقم العقد">
<input name="customerName" placeholder="اسم العميل">
<input name="location" placeholder="الموقع">

<select name="technician">
<option>اختر الفني</option>
<option>احمد</option>
<option>سيد</option>
<option>محمد</option>
<option>علي</option>
<option>خالد</option>
</select>
</div>

<table>
<thead>
<tr>
<th>م</th>
<th>البند</th>
<th>✔</th>
</tr>
</thead>
<tbody id="items"></tbody>
</table>

<textarea name="notes" placeholder="ملاحظات"></textarea>

<div class="buttons">
<button class="save" type="submit">حفظ</button>
<button class="print" type="button" onclick="pdf()">PDF + واتساب</button>
<button class="edit" type="button" onclick="enable()">تعديل</button>
<button class="close" type="button" onclick="window.close()">إغلاق</button>
</div>

<div id="msg"></div>

<div class="footer">
SMOU Group - Elevators & Air Conditioning
</div>

</form>
</div>

<script>
const SCRIPT_URL = "https://script.google.com/a/macros/smou.ae/s/AKfycbzLB-yQsZW4ZQPKvrKcZ4DNPtJiGt9yoR44u7uPxoz1x1hXyF8O4N_RUKuy-3RR4LuaHw/exec";

const list = [
"التأكد من عمل التكييف",
"فتح وغلق الفرامل",
"منسوب الزيت",
"فحص الباور",
"تشغيل الكنترول",
"تنظيف الكنترول",
"تنظيف الكابينة",
"فحص الويرات",
"إضافة زيت",
"تربيط السكة",
"WD40",
"دوائر الأمان",
"مكونات الكابينة",
"لوحة المفاتيح",
"Alarm",
"تسارع الكابينة",
"الأبواب",
"توقف الكابينة"
];

const tbody = document.getElementById("items");

list.forEach((item,i)=>{
tbody.innerHTML += `
<tr>
<td>${i+1}</td>
<td>${item}</td>
<td><input type="checkbox" name="item${i+1}" value="تم"></td>
</tr>`;
});

function init(){
let now = new Date();
date.value = now.toLocaleDateString("en-CA");
time.value = now.toLocaleTimeString();

let last = localStorage.getItem("no") || 2605000;
reportNo.value = ++last;
localStorage.setItem("no", last);
}
init();

form.addEventListener("submit", async(e)=>{
e.preventDefault();

let msg = document.getElementById("msg");
msg.innerHTML = "جاري الحفظ...";

let data = Object.fromEntries(new FormData(form).entries());

for(let i=1;i<=18;i++){
if(!data["item"+i]) data["item"+i] = "لم يتم";
}

let body = new URLSearchParams(data);

await fetch(SCRIPT_URL,{
method:"POST",
mode:"no-cors",
body:body
});

msg.innerHTML = "✔ تم الحفظ";
});

function pdf(){
let el = document.getElementById("reportArea");

html2pdf().set({
  margin: 5,
  filename: 'SMOU-Maintenance-Report.pdf',
  image: { type: 'jpeg', quality: 0.98 },
  html2canvas: { scale: 2, useCORS: true },
  jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
}).from(el).save().then(()=>{
  window.open("https://wa.me/?text=تم إنشاء تقرير الصيانة PDF - SMOU Group","_blank");
});
}

function enable(){
document.querySelectorAll("input,select,textarea").forEach(e=>e.disabled=false);
}
</script>

</body>
</html>
