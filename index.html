<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تقرير صيانة المصعد</title>

<style>
body {
  margin: 0;
  font-family: Tahoma, Arial;
  background: #f4f7fb;
}

.container {
  max-width: 1200px;
  margin: 30px auto;
  background: white;
  padding: 25px;
  border-radius: 15px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.1);
}

h1 {
  text-align: center;
  color: #0b3b82;
}

.grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 15px;
  margin-bottom: 20px;
}

label {
  font-weight: bold;
  color: #0b3b82;
  display: block;
  margin-bottom: 5px;
}

input, select, textarea {
  width: 100%;
  padding: 10px;
  border-radius: 8px;
  border: 1px solid #ccc;
  box-sizing: border-box;
  font-family: Tahoma, Arial;
}

input[readonly] {
  background: #eef3f9;
  font-weight: bold;
}

table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 15px;
}

th, td {
  border: 1px solid #ddd;
  padding: 10px;
  text-align: center;
}

th {
  background: #0b3b82;
  color: white;
}

td:nth-child(2) {
  text-align: right;
  font-weight: bold;
}

.check {
  width: 22px;
  height: 22px;
}

.notes {
  margin-top: 20px;
}

.buttons {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 12px;
  margin-top: 20px;
}

button {
  padding: 14px;
  background: #0b3b82;
  color: white;
  border: none;
  border-radius: 10px;
  font-size: 17px;
  cursor: pointer;
  font-weight: bold;
}

button:hover {
  background: #062b61;
}

.print-btn {
  background: #198754;
}

.edit-btn {
  background: #f59e0b;
}

.close-btn {
  background: #dc3545;
}

.message {
  text-align: center;
  margin-top: 10px;
  font-weight: bold;
}

@media print {
  button, .message {
    display: none;
  }

  body {
    background: white;
  }

  .container {
    box-shadow: none;
    margin: 0;
    max-width: 100%;
  }
}

@media (max-width: 768px) {
  .grid, .buttons {
    grid-template-columns: 1fr;
  }
}
</style>
</head>

<body>

<div class="container" id="reportArea">

<h1>تقرير صيانة المصعد</h1>

<form id="form">

<div class="grid">

  <div>
    <label>التاريخ</label>
    <input type="text" name="date" id="date" readonly>
  </div>

  <div>
    <label>الوقت</label>
    <input type="text" name="time" id="time" readonly>
  </div>

  <div>
    <label>رقم التقرير</label>
    <input type="text" name="reportNo" id="reportNo" readonly>
  </div>

  <div>
    <label>رقم العقد</label>
    <input type="text" name="contractNo" required>
  </div>

  <div>
    <label>اسم العميل</label>
    <input type="text" name="customerName" required>
  </div>

  <div>
    <label>الموقع</label>
    <input type="text" name="location" required>
  </div>

  <div>
    <label>الفني</label>
    <select name="technician" required>
      <option value="">اختر الفني</option>
      <option value="احمد">احمد</option>
      <option value="سيد">سيد</option>
      <option value="محمد">محمد</option>
      <option value="علي">علي</option>
      <option value="خالد">خالد</option>
    </select>
  </div>

</div>

<table>
<thead>
<tr>
  <th>م</th>
  <th>البند</th>
  <th>تم</th>
</tr>
</thead>
<tbody id="items"></tbody>
</table>

<div class="notes">
  <label>ملاحظات</label>
  <textarea name="notes" rows="5" placeholder="اكتب الملاحظات هنا..."></textarea>
</div>

<div class="buttons">
  <button type="submit">حفظ</button>
  <button type="button" class="print-btn" onclick="window.print()">طباعة PDF</button>
  <button type="button" class="edit-btn" onclick="enableEdit()">تعديل</button>
  <button type="button" class="close-btn" onclick="closePage()">إغلاق</button>
</div>

<div class="message" id="msg"></div>

</form>
</div>

<script>
const SCRIPT_URL = "https://script.google.com/a/macros/smou.ae/s/AKfycbzLB-yQsZW4ZQPKvrKcZ4DNPtJiGt9yoR44u7uPxoz1x1hXyF8O4N_RUKuy-3RR4LuaHw/exec";

const list = [
"التأكد من عمل التكييف وتنظيف الماكينة من الغبار والأتربة",
"التأكد من فتح وغلق الفرامل",
"التحقق من منسوب زيت الماكينة",
"التحقق من الباور والانتباه جيدًا لعلامات التآكل",
"التحقق من جودة تشغيل الكنترول",
"تنظيف الكنترول بواسطة البلور",
"تنظيف أعلى الكابينة من الغبار والأتربة",
"التأكد من عدم ارتخاء الويرات وجودة التثبيت",
"إضافة زيت إلى الزوايا",
"تربيط سكة النقل",
"استخدام WD40 للأجزاء المتحركة في الباب",
"مراجعة دوائر الأمان وشوك الأبواب الداخلي والخارجي",
"التحقق من سلامة مكونات الكابينة الداخلية (إضاءة - مروحة - ماسك الديكور - أرضية)",
"فحص لوحة المفاتيح والتأكد من مدى استجابتها للعمل",
"اختبار مفتاح Alarm",
"التحقق من تسارع الكابينة وتباطؤها ودقة ضبطها أثناء السير لأعلى وأسفل",
"التأكد من عمل حركة الأبواب بسلاسة",
"التأكد من وقوف الكابينة على كل مستوى بدقة ونظافة مجرى باب الكابينة"
];

const tbody = document.getElementById("items");

list.forEach((item, i) => {
  tbody.innerHTML += `
  <tr>
    <td>${i + 1}</td>
    <td>${item}</td>
    <td>
      <input class="check" type="checkbox" name="item${i + 1}" value="تم">
    </td>
  </tr>`;
});

function setDateTime() {
  const now = new Date();
  document.getElementById("date").value = now.toLocaleDateString("en-CA");
  document.getElementById("time").value = now.toLocaleTimeString("ar-EG", {
    hour: "2-digit",
    minute: "2-digit"
  });
}

function setReportNo() {
  let lastNo = localStorage.getItem("lastReportNo");

  if (!lastNo) {
    lastNo = 2605000;
  }

  const newNo = Number(lastNo) + 1;
  document.getElementById("reportNo").value = newNo;
}

setDateTime();
setReportNo();

document.getElementById("form").addEventListener("submit", async (e) => {
  e.preventDefault();

  const msg = document.getElementById("msg");
  msg.style.color = "#0b3b82";
  msg.innerHTML = "جاري الحفظ...";

  const formData = new FormData(e.target);
  const data = Object.fromEntries(formData.entries());

  for (let i = 1; i <= 18; i++) {
    if (!data["item" + i]) {
      data["item" + i] = "لم يتم";
    }
  }

  try {
    await fetch(SCRIPT_URL, {
      method: "POST",
      mode: "no-cors",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(data)
    });

    localStorage.setItem("lastReportNo", document.getElementById("reportNo").value);

    msg.style.color = "green";
    msg.innerHTML = "✔ تم حفظ البيانات بنجاح";

    disableForm();

  } catch (err) {
    msg.style.color = "red";
    msg.innerHTML = "❌ حصل خطأ أثناء الحفظ";
  }
});

function disableForm() {
  const fields = document.querySelectorAll("input, select, textarea");
  fields.forEach(field => {
    if (field.type !== "button" && field.type !== "submit") {
      field.disabled = true;
    }
  });
}

function enableEdit() {
  const fields = document.querySelectorAll("input, select, textarea");
  fields.forEach(field => {
    field.disabled = false;
  });

  document.getElementById("date").readOnly = true;
  document.getElementById("time").readOnly = true;
  document.getElementById("reportNo").readOnly = true;

  document.getElementById("msg").style.color = "#f59e0b";
  document.getElementById("msg").innerHTML = "يمكنك التعديل الآن";
}

function closePage() {
  window.close();
  document.body.innerHTML = "<h2 style='text-align:center;margin-top:80px;color:#0b3b82'>تم إغلاق التقرير</h2>";
}
</script>

</body>
</html>
