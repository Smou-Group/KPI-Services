<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تقرير صيانة المصعد - SMOU Group</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>
*{box-sizing:border-box}

body{
  margin:0;
  font-family:Tahoma,Arial,sans-serif;
  background:linear-gradient(160deg,#03152f,#082d63,#020b18);
  min-height:100vh;
  padding:10px;
}

.container{
  max-width:850px;
  margin:auto;
  background:#fff;
  border-radius:22px;
  overflow:hidden;
  box-shadow:0 20px 45px rgba(0,0,0,.35);
}

.header{
  background:linear-gradient(135deg,#061b3a,#0b3b82);
  color:#fff;
  padding:18px;
  text-align:center;
}

.logo{
  width:78px;
  height:78px;
  object-fit:contain;
  background:#fff;
  border-radius:16px;
  padding:8px;
  margin-bottom:8px;
}

.header h2{margin:0;font-size:22px}
.header p{margin:5px 0 0;font-size:13px;color:#dbeafe}

.title{
  text-align:center;
  background:#f1f5f9;
  color:#061b3a;
  font-size:20px;
  font-weight:bold;
  padding:14px;
}

form{padding:14px}

.grid{
  display:grid;
  grid-template-columns:1fr;
  gap:10px;
}

.field label{
  display:block;
  font-size:13px;
  font-weight:bold;
  color:#334155;
  margin-bottom:5px;
}

input,select,textarea{
  width:100%;
  padding:13px;
  font-size:15px;
  border:1px solid #cbd5e1;
  border-radius:14px;
  background:#f8fafc;
}

input:focus,select:focus,textarea:focus{
  outline:none;
  border-color:#0b3b82;
  background:#fff;
}

.section-title{
  margin:16px 0 10px;
  padding:11px;
  background:#061b3a;
  color:white;
  border-radius:12px;
  font-weight:bold;
  text-align:center;
}

.check-item{
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:#f8fafc;
  border:1px solid #dbe3ef;
  border-radius:13px;
  padding:11px;
  margin-bottom:8px;
  font-size:13px;
  font-weight:bold;
}

.check-item input{
  width:24px;
  height:24px;
}

textarea{
  height:80px;
  resize:none;
}

.buttons{
  display:grid;
  grid-template-columns:1fr;
  gap:10px;
  margin-top:15px;
}

button{
  border:none;
  color:white;
  padding:15px;
  border-radius:14px;
  font-size:15px;
  font-weight:bold;
  cursor:pointer;
}

.save{background:#0b3b82}
.pdf{background:#15803d}
.clear{background:#dc2626}

#msg{
  text-align:center;
  margin-top:12px;
  font-weight:bold;
  color:#0b3b82;
}

.footer{
  text-align:center;
  padding:12px;
  color:#64748b;
  font-size:11px;
}

/* PDF One Page */
.pdf-hidden{
  position:fixed;
  left:-10000px;
  top:0;
  width:210mm;
  background:white;
}

.pdf-page{
  width:210mm;
  height:297mm;
  padding:7mm;
  background:#fff;
  font-family:Tahoma,Arial,sans-serif;
  direction:rtl;
  color:#111827;
}

.pdf-head{
  background:linear-gradient(135deg,#061b3a,#0b3b82);
  color:white;
  border-radius:8px;
  padding:8px 12px;
  display:flex;
  align-items:center;
  justify-content:space-between;
}

.pdf-brand{
  display:flex;
  align-items:center;
  gap:10px;
}

.pdf-logo{
  width:42px;
  height:42px;
  background:white;
  border-radius:8px;
  padding:4px;
  object-fit:contain;
}

.pdf-company{
  font-size:15px;
  font-weight:bold;
}

.pdf-sub{
  font-size:9px;
  opacity:.9;
}

.pdf-title{
  font-size:17px;
  font-weight:bold;
}

.pdf-info{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:5px;
  margin-top:8px;
}

.pdf-box{
  border:1px solid #cbd5e1;
  border-radius:6px;
  padding:5px;
  min-height:30px;
}

.pdf-label{
  font-size:8px;
  color:#475569;
}

.pdf-value{
  font-size:10px;
  font-weight:bold;
  margin-top:2px;
}

.pdf-checks{
  width:100%;
  border-collapse:collapse;
  margin-top:8px;
  font-size:8.2px;
}

.pdf-checks th{
  background:#061b3a;
  color:white;
  padding:4px;
  border:1px solid #061b3a;
}

.pdf-checks td{
  border:1px solid #cbd5e1;
  padding:3px 4px;
  vertical-align:middle;
}

.pdf-checks td:nth-child(1){
  width:8mm;
  text-align:center;
}

.pdf-checks td:nth-child(3){
  width:18mm;
  text-align:center;
  font-weight:bold;
}

.pdf-notes{
  margin-top:7px;
  border:1px solid #cbd5e1;
  border-radius:6px;
  padding:6px;
  min-height:28px;
  font-size:9px;
}

.pdf-sign{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
  margin-top:10px;
}

.pdf-sign div{
  border-top:1px solid #334155;
  padding-top:5px;
  font-size:9px;
  text-align:center;
}

.pdf-footer{
  margin-top:6px;
  text-align:center;
  font-size:8px;
  color:#64748b;
}

@media(min-width:700px){
  .grid{grid-template-columns:repeat(2,1fr)}
  .buttons{grid-template-columns:repeat(3,1fr)}
}
</style>
</head>

<body>

<div class="container" id="appArea">

  <div class="header">
    <img src="logo.png" class="logo" alt="SMOU Group Logo">
    <h2>مجموعة سمو</h2>
    <p>SMOU Group - Elevators & Air Conditioning</p>
  </div>

  <div class="title">تقرير صيانة المصعد</div>

  <form id="form">

    <div class="grid">
      <div class="field">
        <label>التاريخ</label>
        <input name="date" id="date" readonly>
      </div>

      <div class="field">
        <label>الوقت</label>
        <input name="time" id="time" readonly>
      </div>

      <div class="field">
        <label>رقم التقرير</label>
        <input name="reportNo" id="reportNo" readonly>
      </div>

      <div class="field">
        <label>رقم العقد</label>
        <input name="contractNo" placeholder="رقم العقد">
      </div>

      <div class="field">
        <label>اسم العميل</label>
        <input name="customerName" placeholder="اسم العميل">
      </div>

      <div class="field">
        <label>الموقع</label>
        <input name="location" placeholder="الموقع">
      </div>

      <div class="field">
        <label>الفني</label>
        <select name="technician">
          <option value="">اختر الفني</option>
          <option>احمد</option>
          <option>سيد</option>
          <option>محمد</option>
          <option>علي</option>
          <option>خالد</option>
        </select>
      </div>
    </div>

    <div class="section-title">بنود الصيانة</div>
    <div id="items"></div>

    <div class="section-title">ملاحظات</div>
    <textarea name="notes" placeholder="ملاحظات"></textarea>

    <div class="buttons">
      <button type="submit" class="save">حفظ في Google Sheet</button>
      <button type="button" class="pdf" onclick="sharePDF()">PDF + واتساب</button>
      <button type="button" class="clear" onclick="location.reload()">تقرير جديد</button>
    </div>

    <div id="msg"></div>

  </form>

  <div class="footer">SMOU Group - Maintenance Report</div>

</div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyOwiFy1_yHWGq_id30gl0YVscY8enyVZfAdtLYgDiKn5ek1R-cEMGoI_QK3hephXHLwg/exec";

const items = [
"التأكد من عمل التكييف وتنظيف الماكينة من الغبار والأتربة",
"التأكد من فتح وغلق الفرامل",
"التحقق من منسوب زيت الماكينة",
"التحقق من الباور والانتباه جيدًا لعلامات التآكل",
"التحقق من جودة تشغيل الكنترول",
"تنظيف الكنترول بواسطة البلور",
"تنظيف أعلى الكابينة من الغبار والأتربة",
"التأكد من عدم ارتخاء الويرات وجودة التثبيت",
"إضافة زيت إلى الزوايا",
"تربيط سكة النقل",
"استخدام WD40 للأجزاء المتحركة في الباب",
"مراجعة دوائر الأمان وشوك الأبواب الداخلي والخارجي",
"التحقق من سلامة مكونات الكابينة الداخلية (إضاءة - مروحة - ماسك الديكور - أرضية)",
"فحص لوحة المفاتيح والتأكد من مدى استجابتها للعمل",
"اختبار مفتاح Alarm",
"التحقق من تسارع الكابينة وتباطؤها ودقة ضبطها أثناء السير لأعلى وأسفل",
"التأكد من عمل حركة الأبواب بسلاسة",
"التأكد من وقوف الكابينة على كل مستوى بدقة ونظافة مجرى باب الكابينة"
];

const itemsBox = document.getElementById("items");

items.forEach((text,index)=>{
  itemsBox.innerHTML += `
    <label class="check-item">
      <span>${index+1}. ${text}</span>
      <input type="checkbox" name="item${index+1}" value="تم">
    </label>
  `;
});

function init(){
  const now = new Date();
  document.getElementById("date").value = now.toLocaleDateString("en-CA");
  document.getElementById("time").value = now.toLocaleTimeString("ar-AE");

  let lastNo = localStorage.getItem("SMOU_REPORT_NO") || 2605000;
  lastNo++;
  document.getElementById("reportNo").value = lastNo;
  localStorage.setItem("SMOU_REPORT_NO", lastNo);
}
init();

document.getElementById("form").addEventListener("submit",function(e){
  e.preventDefault();

  const msg = document.getElementById("msg");
  msg.innerHTML = "جاري الحفظ...";

  const formData = new FormData(this);

  for(let i=1;i<=18;i++){
    if(!formData.has("item"+i)){
      formData.append("item"+i,"لم يتم");
    }
  }

  fetch(SCRIPT_URL,{
    method:"POST",
    mode:"no-cors",
    body:formData
  });

  msg.innerHTML = "✔ تم إرسال البيانات إلى Google Sheet";
});

async function sharePDF(){
  const form = document.getElementById("form");
  const data = Object.fromEntries(new FormData(form).entries());

  for(let i=1;i<=18;i++){
    if(!data["item"+i]) data["item"+i] = "لم يتم";
  }

  const reportNo = data.reportNo || document.getElementById("reportNo").value;
  const fileName = "SMOU-Maintenance-Report-" + reportNo + ".pdf";

  let rows = "";
  items.forEach((item,index)=>{
    const status = data["item"+(index+1)] === "تم" ? "✓ تم" : "لم يتم";
    rows += `
      <tr>
        <td>${index+1}</td>
        <td>${item}</td>
        <td>${status}</td>
      </tr>
    `;
  });

  const pdfWrapper = document.createElement("div");
  pdfWrapper.className = "pdf-hidden";

  pdfWrapper.innerHTML = `
    <div class="pdf-page" id="pdfPage">

      <div class="pdf-head">
        <div class="pdf-brand">
          <img src="logo.png" class="pdf-logo">
          <div>
            <div class="pdf-company">مجموعة سمو</div>
            <div class="pdf-sub">SMOU Group - Elevators & Air Conditioning</div>
          </div>
        </div>
        <div class="pdf-title">تقرير صيانة المصعد</div>
      </div>

      <div class="pdf-info">
        <div class="pdf-box">
          <div class="pdf-label">التاريخ</div>
          <div class="pdf-value">${data.date || ""}</div>
        </div>
        <div class="pdf-box">
          <div class="pdf-label">الوقت</div>
          <div class="pdf-value">${data.time || ""}</div>
        </div>
        <div class="pdf-box">
          <div class="pdf-label">رقم التقرير</div>
          <div class="pdf-value">${data.reportNo || ""}</div>
        </div>
        <div class="pdf-box">
          <div class="pdf-label">رقم العقد</div>
          <div class="pdf-value">${data.contractNo || ""}</div>
        </div>
        <div class="pdf-box">
          <div class="pdf-label">اسم العميل</div>
          <div class="pdf-value">${data.customerName || ""}</div>
        </div>
        <div class="pdf-box">
          <div class="pdf-label">الموقع</div>
          <div class="pdf-value">${data.location || ""}</div>
        </div>
        <div class="pdf-box">
          <div class="pdf-label">الفني</div>
          <div class="pdf-value">${data.technician || ""}</div>
        </div>
        <div class="pdf-box">
          <div class="pdf-label">نوع التقرير</div>
          <div class="pdf-value">صيانة دورية</div>
        </div>
      </div>

      <table class="pdf-checks">
        <thead>
          <tr>
            <th>م</th>
            <th>بند الفحص والصيانة</th>
            <th>الحالة</th>
          </tr>
        </thead>
        <tbody>
          ${rows}
        </tbody>
      </table>

      <div class="pdf-notes">
        <strong>ملاحظات:</strong><br>
        ${data.notes || "لا توجد ملاحظات"}
      </div>

      <div class="pdf-sign">
        <div>توقيع الفني</div>
        <div>توقيع العميل</div>
      </div>

      <div class="pdf-footer">
        SMOU Group - Elevators & Air Conditioning | Maintenance Report
      </div>

    </div>
  `;

  document.body.appendChild(pdfWrapper);

  const element = document.getElementById("pdfPage");

  const opt = {
    margin:0,
    filename:fileName,
    image:{type:"jpeg",quality:0.98},
    html2canvas:{scale:2,useCORS:true},
    jsPDF:{unit:"mm",format:"a4",orientation:"portrait"},
    pagebreak:{mode:["avoid-all"]}
  };

  const worker = html2pdf().set(opt).from(element);
  const pdfBlob = await worker.outputPdf("blob");

  document.body.removeChild(pdfWrapper);

  const file = new File([pdfBlob],fileName,{type:"application/pdf"});

  if(navigator.canShare && navigator.canShare({files:[file]})){
    await navigator.share({
      title:"تقرير صيانة المصعد",
      text:"مرفق تقرير صيانة المصعد - SMOU Group",
      files:[file]
    });
  }else{
    const url = URL.createObjectURL(pdfBlob);
    const a = document.createElement("a");
    a.href = url;
    a.download = fileName;
    a.click();
    URL.revokeObjectURL(url);
  }
}
</script>

</body>
</html>
